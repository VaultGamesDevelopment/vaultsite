<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
:root {
    --bg: #0a0b10;
    --bg-2: #0e0f16;
    --panel: #14161f;
    --panel-hover: #1a1d29;
    --line: #23273580;
    --line-strong: #343a4d;
    --text: #e9eaf1;
    --text-dim: #9298ab;
    --text-faint: #565c73;
    --violet: #8b7dff;
    --cyan: #45e0c4;
    --pink: #ff5fa0;
    --amber: #ffb454;
    --grad: linear-gradient(135deg, var(--violet), var(--cyan));
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --font-display: 'Space Grotesk', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}
body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 28px;
    position: relative;
    overflow-x: hidden;
}
body::before,
body::after {
    content: "";
    position: fixed;
    width: 60vw;
    height: 60vw;
    max-width: 720px;
    max-height: 720px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.16;
    z-index: -1;
    pointer-events: none;
    animation: driftBlob 26s ease-in-out infinite alternate;
}
body::before {
    background: var(--violet);
    top: -20%;
    left: -12%;
}
body::after {
    background: var(--cyan);
    bottom: -22%;
    right: -10%;
    animation-delay: -12s;
    animation-duration: 32s;
}
@keyframes driftBlob {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(6%, 4%) scale(1.12); }
}
body.dark-mode {
    background: #060709;
}
body.dark-mode::before,
body.dark-mode::after {
    opacity: 0.11;
}
@media (prefers-reduced-motion: reduce) {
    body::before, body::after { animation: none; }
}
.container {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
}
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding: 16px 22px;
    margin-bottom: 28px;
    background: rgba(20, 22, 31, 0.6);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    position: sticky;
    top: 16px;
    z-index: 50;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
}
header > div:first-child {
    display: flex;
    align-items: center;
    gap: 12px;
}
header > div:first-child::before {
    content: "";
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: var(--grad);
    box-shadow: 0 0 18px rgba(139, 125, 255, 0.5);
    flex-shrink: 0;
}
header h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: 1px;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.1;
}
.controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
}
.controls input,
.controls select {
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    background: var(--panel);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.controls input::placeholder {
    color: var(--text-faint);
}
.controls input:focus,
.controls select:focus {
    border-color: var(--violet);
    box-shadow: 0 0 0 3px rgba(139, 125, 255, 0.18);
    background: var(--panel-hover);
}
.controls select {
    cursor: pointer;
}
.nav-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.nav-buttons button,
.settings-button {
    padding: 9px 18px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    background: var(--panel);
    color: var(--text-dim);
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s ease;
}
.nav-buttons button:hover,
.settings-button:hover {
    background: var(--panel-hover);
    border-color: var(--violet);
    color: var(--text);
    transform: translateY(-1px);
}
.featured-section {
    margin-bottom: 30px;
}
.featured-section summary {
    font-family: var(--font-display);
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    padding: 10px 4px;
    color: var(--text);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
}
.featured-section summary::-webkit-details-marker {
    display: none;
}
.featured-section summary::before {
    content: "";
    width: 4px;
    height: 18px;
    border-radius: 4px;
    background: var(--grad);
    display: inline-block;
}
.featured-section summary::after {
    content: "\2039";
    margin-left: auto;
    transform: rotate(-90deg);
    color: var(--text-faint);
    font-size: 1.1rem;
    transition: transform 0.2s ease;
}
.featured-section[open] summary::after {
    transform: rotate(0deg);
}
.featured-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 18px;
    margin-top: 14px;
}
.zone-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 18px;
}
.summary-text {
    font-family: var(--font-display);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    padding: 10px 4px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.summary-text::before {
    content: "";
    width: 4px;
    height: 18px;
    border-radius: 4px;
    background: var(--grad);
    display: inline-block;
}
.subtitle {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--text-faint);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
}
.zone-item {
    position: relative;
    background: var(--panel);
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--line);
    transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease;
    aspect-ratio: 16/9;
    isolation: isolate;
}
.zone-item::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: inherit;
    padding: 2px;
    background: conic-gradient(from 0deg, var(--violet), var(--cyan), var(--pink), var(--violet));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.25s ease;
    animation: spinHalo 5s linear infinite;
    z-index: -1;
    pointer-events: none;
}
@keyframes spinHalo {
    to { transform: rotate(360deg); }
}
.zone-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(139,125,255,0.15);
}
.zone-item:hover::before {
    opacity: 1;
}
.zone-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: var(--panel-hover);
}
.zone-item button {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 24px 12px 10px;
    border: none;
    background: linear-gradient(to top, rgba(6,7,10,0.92) 10%, rgba(6,7,10,0) 100%);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.1px;
}
.zone-item button:hover {
    color: var(--cyan);
}
.zone-viewer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1000;
    background: var(--bg);
}
.zone-viewer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(20, 22, 31, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
}
.zone-viewer-header .info {
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
}
.zone-viewer-header .info h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--text);
}
.zone-viewer-header .info a {
    color: var(--cyan);
    text-decoration: none;
    font-size: 0.82rem;
}
.zone-viewer-header .info a:hover {
    text-decoration: underline;
}
.zone-viewer-header .info span {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-faint);
}
.zone-viewer-header .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.zone-viewer-header .actions button {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.8rem;
    background: var(--panel);
    color: var(--text-dim);
    transition: all 0.2s ease;
}
.zone-viewer-header .actions button:hover {
    background: var(--panel-hover);
    border-color: var(--violet);
    color: var(--text);
}
.zone-viewer-header .actions button.primary-btn {
    background: var(--grad);
    border-color: transparent;
    color: #0a0b10;
    font-weight: 600;
}
.zone-viewer-header .actions button.primary-btn:hover {
    filter: brightness(1.08);
    color: #0a0b10;
}
.zone-viewer-header .actions button.close-btn {
    border-color: rgba(255, 95, 160, 0.4);
    color: var(--pink);
}
.zone-viewer-header .actions button.close-btn:hover {
    background: rgba(255, 95, 160, 0.12);
    border-color: var(--pink);
    color: var(--pink);
}
#zoneFrame {
    width: 100%;
    height: calc(100% - 58px);
    border: none;
}
.popup-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2000;
    background: rgba(6, 7, 10, 0.75);
    backdrop-filter: blur(4px);
    justify-content: center;
    align-items: center;
}
.popup-content {
    background: var(--panel);
    border-radius: var(--radius-lg);
    padding: 26px;
    min-width: 320px;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid var(--line-strong);
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    animation: popIn 0.22s cubic-bezier(.2,.8,.2,1);
}
@keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}
.popup-content h2 {
    font-family: var(--font-display);
    margin-bottom: 15px;
    font-size: 1.15rem;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}
.popup-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s ease;
}
.popup-close:hover {
    color: var(--pink);
}
.popup-body {
    line-height: 1.65;
    color: var(--text-dim);
    font-size: 0.92rem;
}
.popup-body b {
    color: var(--text);
}
.popup-body input[type="text"] {
    width: 100%;
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line-strong);
    background: var(--bg-2);
    color: var(--text);
    outline: none;
    font-family: var(--font-body);
}
.popup-body input[type="text"]:focus {
    border-color: var(--violet);
}
.popup-body a {
    color: var(--cyan);
}
.dmca-content ol {
    padding-left: 20px;
}
.dmca-content code {
    background: var(--bg-2);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    color: var(--amber);
}
.settings-button {
    display: block;
    width: 100%;
    text-align: left;
}
::selection {
    background: var(--violet);
    color: #0a0b10;
}
::-webkit-scrollbar {
    width: 10px;
    height: 10px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: var(--line-strong);
    border-radius: 999px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--violet);
}
@media (max-width: 600px) {
    body { padding: 14px; }
    .zone-grid,
    .featured-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }
    header {
        flex-direction: column;
        align-items: flex-start;
        position: static;
        padding: 16px;
    }
    .controls {
        width: 100%;
    }
    .controls input {
        flex: 1;
    }
}
</style>
</head>
<body>
<div class="container" id="mainContainer">
<header>
    <div>
        <div>
            <h1>The Vault</h1>
            <p class="subtitle">Unlocked Games</p>
        </div>
    </div>
    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search the vault..." oninput="filterZones()">
        <select id="sortOptions" onchange="sortZones()">
            <option value="popular">Most Popular</option>
            <option value="trendingMonth">Trending Month</option>
            <option value="trendingWeek">Trending Week</option>
            <option value="trendingDay">Trending Day</option>
            <option value="name">Name A-Z</option>
            <option value="id">Newest</option>
        </select>
        <select id="filterOptions" onchange="filterZones2()">
            <option value="none">All Tags</option>
        </select>
    </div>
    <div class="nav-buttons">
        <button id="settings">Settings</button>
        <button onclick="showContact()">Contact</button>
        <button onclick="loadPrivacy()">Privacy</button>
        <button onclick="loadDMCA()">DMCA</button>
    </div>
</header>

<details class="featured-section" id="featuredZonesWrapper" open>
    <summary id="allZonesSummary">Featured Zones</summary>
    <div class="featured-grid" id="featuredZones"></div>
</details>

<p class="summary-text" id="allSummary">All Zones</p>
<div class="zone-grid" id="container"></div>
</div>

<div class="zone-viewer" id="zoneViewer">
<div class="zone-viewer-header">
    <div class="info">
        <h2 id="zoneName"></h2>
        <a id="zoneAuthor" href="#" target="_blank"></a>
        <span>ID: <span id="zoneId"></span></span>
    </div>
    <div class="actions">
        <button onclick="showZoneInfo()">Info</button>
        <button onclick="aboutBlank()">About:Blank</button>
        <button class="primary-btn" onclick="downloadZone()">Download</button>
        <button onclick="fullscreenZone()">Fullscreen</button>
        <button class="close-btn" onclick="closeZone()">Close</button>
    </div>
</div>
<iframe id="zoneFrame" src="about:blank"></iframe>
</div>

<div class="popup-overlay" id="popupOverlay">
<div class="popup-content">
    <button class="popup-close" onclick="closePopup()">&times;</button>
    <h2 id="popupTitle">Popup</h2>
    <div class="popup-body" id="popupBody"></div>
</div>
</div>

<input type="file" id="loadDataInput" accept=".data" style="display:none" onchange="loadData(event)">

<script>
const container = document.getElementById('container');
const zoneViewer = document.getElementById('zoneViewer');
let zoneFrame = document.getElementById('zoneFrame');
const searchBar = document.getElementById('searchBar');
const sortOptions = document.getElementById('sortOptions');
const filterOptions = document.getElementById('filterOptions');
const zonesurls = [
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets/zones.json"
];
let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";
let zones = [];
let popularityData = {};
const featuredContainer = document.getElementById('featuredZones');
function toTitleCase(str) {
  return str.replace(
    /\w\S*/g,
    text => text.charAt(0).toUpperCase() + text.substring(1).toLowerCase()
  );
}
async function listZones() {
    try {
      let sharesponse;
      let shajson;
      let sha;
        try {
          sharesponse = await fetch("https://api.github.com/repos/freebuisness/assets/commits?t="+Date.now());
        } catch (error) {}
        if (sharesponse && sharesponse.status === 200) {
          try {
            shajson = await sharesponse.json();
            sha = shajson[0]['sha'];
            if (sha) {
                zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
            }
          } catch (error) {
            try {
                let secondarysharesponse = await fetch("https://raw.githubusercontent.com/freebuisness/xml/refs/heads/main/sha.txt?t="+Date.now());
                if (secondarysharesponse && secondarysharesponse.status === 200) {
                    sha = (await secondarysharesponse.text()).trim();
                    if (sha) {
                        zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
                    }
                }
            } catch(error) {}
          }
        }
        const response = await fetch(zonesURL+"?t="+Date.now());
        const json = await response.json();
        zones = json;
        zones[0].featured = true;
        await Promise.all([fetchPopularity("year"), fetchPopularity("month"), fetchPopularity("week"), fetchPopularity("day")]);
        sortZones();
        try {
        const search = new URLSearchParams(window.location.search);
        const id = search.get('id');
        const embed = window.location.hash.includes("embed");
        if (id) {
            const zone = zones.find(zone => zone.id + '' == id + '');
            if (zone) {
                if (embed) {
                    if (zone.url.startsWith("http")) {
                        window.open(zone.url, "_blank");
                    } else {
                        const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                        fetch(url+"?t="+Date.now()).then(response => response.text()).then(html => {
                            document.documentElement.innerHTML = html;
                            const popup = document.createElement("div");
                            popup.style.position = "fixed";
                            popup.style.bottom = "20px";
                            popup.style.right = "20px";
                            popup.style.backgroundColor = "#cce5ff";
                            popup.style.color = "#004085";
                            popup.style.padding = "10px";
                            popup.style.border = "1px solid #b8daff";
                            popup.style.borderRadius = "5px";
                            popup.style.boxShadow = "0px 0px 10px rgba(0,0,0,0.1)";
                            popup.style.fontFamily = "Arial, sans-serif";
                            
                            popup.innerHTML = `Play more games at <a href="https://thevault.dev" target="_blank" style="color:#004085; font-weight:bold;">The Vault</a>!`;
                            
                            const closeBtn = document.createElement("button");
                            closeBtn.innerText = "?";
                            closeBtn.style.marginLeft = "10px";
                            closeBtn.style.background = "none";
                            closeBtn.style.border = "none";
                            closeBtn.style.cursor = "pointer";
                            closeBtn.style.color = "#004085";
                            closeBtn.style.fontWeight = "bold";
                            
                            closeBtn.onclick = () => popup.remove();
                            popup.appendChild(closeBtn);
                            document.body.appendChild(popup);
                            document.documentElement.querySelectorAll('script').forEach(oldScript => {
                                const newScript = document.createElement('script');
                                if (oldScript.src) {
                                    newScript.src = oldScript.src;
                                } else {
                                    newScript.textContent = oldScript.textContent;
                                }
                                document.body.appendChild(newScript);
                            });
                        }).catch(error => alert("Failed to load zone: " + error));
                    }
                } else {
                    openZone(zone);
                }
            }
        }
        } catch(error){}
        let alltags = [];
        for (const obj of json) {
            if (Array.isArray(obj.special)) {
                alltags.push(...obj.special);
            }
        }

        alltags = [...new Set(alltags)];
        let filteroption = document.getElementById("filterOptions");
        if (filteroption && filteroption.children.length > 1) {
            while (filteroption.children.length > 1) {
                filteroption.removeChild(filteroption.lastElementChild);
            }
        }
        for (const tag of alltags) {
            const opt = document.createElement("option");
            opt.value = tag;
            opt.textContent = toTitleCase(tag);
            filteroption.appendChild(opt);
        }
    } catch (error) {
        console.error(error);
        container.innerHTML = `Error loading zones: ${error}`;
    }
}
async function fetchPopularity(duration) {
    try {
        if (!popularityData[duration]) {
            popularityData[duration] = {};
        }
        const response = await fetch(
            "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=" + duration
        );
        const data = await response.json();
        data.forEach(file => {
            const idMatch = file.name.match(/\/(\d+)\.html$/);
            if (idMatch) {
                const id = parseInt(idMatch[1]);
                popularityData[duration][id] = file.hits?.total ?? 0;
            }
        });
    } catch (error) {
        if (!popularityData[duration]) {
            popularityData[duration] = {};
        }
        popularityData[duration][0] = 0;
    }
}


function sortZones() {
    const sortBy = sortOptions.value;
    if (sortBy === 'name') {
        zones.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sortBy === 'id') {
        zones.sort((a, b) => a.id - b.id);
    } else if (sortBy === 'popular') {
        zones.sort((a, b) => ((popularityData['year']?.[b.id]) ?? 0) - ((popularityData['year']?.[a.id]) ?? 0));
    } else if (sortBy === 'trendingMonth') {
        zones.sort((a, b) => ((popularityData['month']?.[b.id]) ?? 0) - ((popularityData['month']?.[a.id]) ?? 0));
    } else if (sortBy === 'trendingWeek') {
        zones.sort((a, b) => ((popularityData['week']?.[b.id]) ?? 0) - ((popularityData['week']?.[a.id]) ?? 0));
    } else if (sortBy === 'trendingDay') {
        zones.sort((a, b) => ((popularityData['day']?.[b.id]) ?? 0) - ((popularityData['day']?.[a.id]) ?? 0));
    }
    zones.sort((a, b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
    if (featuredContainer.innerHTML === "") {
        const featured = zones.filter(z => z.featured);

function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
    if (typeof obj === 'string') {
      return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
    }
    
    if (obj instanceof Uint8Array) {
      if (obj.length > maxArrayLen) {
        return `[Uint8Array too large (${obj.length} bytes), truncated]`;
      }
      return obj;
    }
    
    if (Array.isArray(obj)) {
      return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
    }
    
    if (obj && typeof obj === 'object') {
      const newObj = {};
      for (const key in obj) {
        if (obj.hasOwnProperty(key)) {
          newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen);
        }
      }
      return newObj;
    }
    
    return obj;
  }

async function saveData() {
    alert("This might take a while, dont touch anything other than this OK button");
    const result = {};
    result.cookies = document.cookie;
    result.localStorage = {...localStorage};
    result.sessionStorage = {...sessionStorage};
    result.indexedDB = {};
    const dbs = await indexedDB.databases();
    for (const dbInfo of dbs) {
      if (!dbInfo.name) continue;
      result.indexedDB[dbInfo.name] = {};
      await new Promise((resolve, reject) => {
        const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
        openRequest.onerror = () => reject(openRequest.error);
        openRequest.onsuccess = () => {
          const db = openRequest.result;
          const storeNames = Array.from(db.objectStoreNames);
          if (storeNames.length === 0) {
            resolve();
            return;
          }
          const transaction = db.transaction(storeNames, "readonly");
          const storePromises = [];
          for (const storeName of storeNames) {
            result.indexedDB[dbInfo.name][storeName] = [];
            const store = transaction.objectStore(storeName);
            const getAllRequest = store.getAll();
            const p = new Promise((res, rej) => {
              getAllRequest.onsuccess = () => {
                result.indexedDB[dbInfo.name][storeName] = sanitizeData(getAllRequest.result, 1000, 100);
                res();
              };
              getAllRequest.onerror = () => rej(getAllRequest.error);
            });
            storePromises.push(p);
          }
          Promise.all(storePromises).then(() => resolve());
        };
      });
    }

    result.caches = {};
    const cacheNames = await caches.keys();
    for (const cacheName of cacheNames) {
      const cache = await caches.open(cacheName);
      const requests = await cache.keys();
      result.caches[cacheName] = [];
      for (const req of requests) {
        const response = await cache.match(req);
        if (!response) continue;
        const cloned = response.clone();
        const contentType = cloned.headers.get('content-type') || '';
        let body;
        try {
          if (contentType.includes('application/json')) {
            body = await cloned.json();
          } else if (contentType.includes('text') || contentType.includes('javascript')) {
            body = await cloned.text();
          } else {
            const buffer = await cloned.arrayBuffer();
            body = btoa(String.fromCharCode(...new Uint8Array(buffer)));
          }
        } catch (e) {
          body = '[Unable to read body]';
        }
        result.caches[cacheName].push({
          url: req.url,
          body,
          contentType
        });
      }
    }
  
    alert("Done, wait for the download to come");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], {
        type: "application/octet-stream"
    }));
    link.download = `${Date.now()}.data`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
  
  async function loadData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function (e) {
        const data = JSON.parse(e.target.result);
        if (data.cookies) {
            data.cookies.split(';').forEach(cookie => {
              document.cookie = cookie.trim();
            });
          }
        
          if (data.localStorage) {
            for (const key in data.localStorage) {
              localStorage.setItem(key, data.localStorage[key]);
            }
          }
        
          if (data.sessionStorage) {
            for (const key in data.sessionStorage) {
              sessionStorage.setItem(key, data.sessionStorage[key]);
            }
          }
        
          if (data.indexedDB) {
            for (const dbName in data.indexedDB) {
              const stores = data.indexedDB[dbName];
              await new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = e => {
                  const db = e.target.result;
                  for (const storeName in stores) {
                    if (!db.objectStoreNames.contains(storeName)) {
                      db.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true });
                    }
                  }
                };
                request.onsuccess = e => {
                  const db = e.target.result;
                  const transaction = db.transaction(Object.keys(stores), 'readwrite');
                  transaction.onerror = () => reject(transaction.error);
                  let pendingStores = Object.keys(stores).length;
        
                  for (const storeName in stores) {
                    const objectStore = transaction.objectStore(storeName);
                    objectStore.clear().onsuccess = () => {
                      for (const item of stores[storeName]) {
                        objectStore.put(item);
                      }
                      pendingStores--;
                      if (pendingStores === 0) resolve();
                    };
                  }
                };
                request.onerror = () => reject(request.error);
              });
            }
          }
        
          if (data.caches) {
            for (const cacheName in data.caches) {
              const cache = await caches.open(cacheName);
              await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k))));
        
              for (const entry of data.caches[cacheName]) {
                let responseBody;
                if (entry.contentType.includes('application/json')) {
                  responseBody = JSON.stringify(entry.body);
                } else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) {
                  responseBody = entry.body;
                } else {
                  const binaryStr = atob(entry.body);
                  const len = binaryStr.length;
                  const bytes = new Uint8Array(len);
                  for (let i = 0; i < len; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                  }
                  responseBody = bytes.buffer;
                }
                const headers = new Headers({ 'content-type': entry.contentType });
                const response = new Response(responseBody, { headers });
                await cache.put(entry.url, response);
              }
            }
          }
        alert("Data loaded");
    };
    alert("This might take a while, dont touch anything other than this OK button");
    reader.readAsText(file);
  }

let _allStatsCache = null;

async function getAllStats() {
  if (_allStatsCache) {
    return _allStatsCache;
  }

  const BASE_URL =
    "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files";
  const PERIOD = "year";
  const PAGE_BATCH = 5;

  let page = 1;
  let done = false;
  const combinedMap = Object.create(null);

  while (!done) {
    const pages = Array.from({ length: PAGE_BATCH }, (_, i) => page + i);

    const responses = await Promise.all(
      pages.map(p =>
        fetch(`${BASE_URL}?period=${PERIOD}&page=${p}&limit=100`)
          .then(r => (r.ok ? r.json() : []))
      )
    );

    for (const data of responses) {
      if (!Array.isArray(data) || data.length === 0) {
        done = true;
        break;
      }

      for (const item of data) {
        if (!item?.name) continue;

        const match = item.name.match(/^\/(\d+)([.-])/);
        if (!match) continue;

        const id = match[1];

        if (!combinedMap[id]) {
          combinedMap[id] = {
            hits: 0,
            bandwidth: 0
          };
        }

        combinedMap[id].hits += item.hits?.total ?? 0;
        combinedMap[id].bandwidth += item.bandwidth?.total ?? 0;
      }
    }

    page += PAGE_BATCH;
  }

  _allStatsCache = combinedMap;
  return combinedMap;
}

async function getStats(id) {
  id = String(id);
  const allStats = await getAllStats();

  return allStats[id]?.hits ?? 0;
}

        <b>Times Played (Globally)</b>: ${Number(stats).toLocaleString("en-US")}
        </p>`;
    })
}

function closePopup() {
    document.getElementById('popupOverlay').style.display = "none";
}
listZones();

HTMLCanvasElement.prototype.toDataURL = function (...args) {
    return "";
};
</script>
